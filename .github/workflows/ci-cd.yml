name: Deploy SSH (Debug Mode)

on:
  push:
    branches: ["main"]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. DEBUG SECRETS (KHÔNG LỘ VALUE)
      - name: Debug secrets safely
        run: |
          echo "===== DEBUG SECRETS STATUS ====="

          if [ -z "${{ secrets.HOST }}" ]; then
            echo "❌ HOST: EMPTY or NOT SET"
          else
            echo "✅ HOST: SET (length=$(echo '${{ secrets.HOST }}' | wc -c))"
          fi

          if [ -z "${{ secrets.USERNAME }}" ]; then
            echo "❌ USERNAME: EMPTY or NOT SET"
          else
            echo "✅ USERNAME: SET (length=$(echo '${{ secrets.USERNAME }}' | wc -c))"
          fi

          if [ -z "${{ secrets.KEY }}" ]; then
            echo "❌ KEY: EMPTY or NOT SET"
          else
            echo "✅ KEY: SET (length=$(echo '${{ secrets.KEY }}' | wc -c))"
          fi

          echo "===== END DEBUG ====="

      # 3. FAIL EARLY nếu thiếu HOST (quan trọng)
      - name: Validate HOST
        run: |
          if [ -z "${{ secrets.HOST }}" ]; then
            echo "❌ ERROR: HOST secret is missing"
            exit 1
          fi

      # 4. SSH DEPLOY
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT || 22 }}
          command_timeout: 10m
          script: |
            echo "🚀 Connected to server"

            cd /var/www/app || {
              echo "❌ Cannot find /var/www/app"
              exit 1
            }

            echo "📥 Pull latest code"
            git pull origin main

            echo "📦 Install dependencies"
            npm install

            echo "🔄 Restart app"
            pm2 restart all || pm2 start index.js

            echo "✅ DONE DEPLOY"