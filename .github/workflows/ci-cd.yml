name: CI/CD Docker GHCR

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v3

      # 2. Login to GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      # 3. Build & Push Docker image
      - name: Build & Push
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/game-server:latest .
          docker push ghcr.io/${{ github.repository_owner }}/game-server:latest