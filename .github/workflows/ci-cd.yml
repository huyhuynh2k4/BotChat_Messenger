name: Deploy via SSH

on:
  push:
    branches: ["main"]

  # Cho phép chạy thủ công trên GitHub
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug an toàn (không lộ secret)
      - name: Check secrets (safe debug)
        run: |
          if [ -z "${{ secrets.HOST }}" ]; then
            echo "HOST is NOT set"
          else
            echo "HOST is set"
          fi

          if [ -z "${{ secrets.USERNAME }}" ]; then
            echo "USERNAME is NOT set"
          else
            echo "USERNAME is set"
          fi

          if [ -z "${{ secrets.KEY }}" ]; then
            echo "SSH KEY is NOT set"
          else
            echo "SSH KEY is set (length: $(echo '${{ secrets.KEY }}' | wc -c))"
          fi

      # Deploy qua SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT || 22 }}
          command_timeout: 10m
          script: |
            echo "🚀 Starting deployment..."

            cd /var/www/app || exit 1

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install

            echo "🔄 Restarting app..."
            pm2 restart all || pm2 start index.js

            echo "✅ Deployment finished!"